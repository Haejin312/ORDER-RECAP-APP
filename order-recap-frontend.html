<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Recap App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;}

.header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.header h1{font-size:16px;font-weight:700;letter-spacing:1.5px;}
.btn-settings{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;}

.container{max-width:860px;margin:0 auto;padding:22px 16px;}

.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.card-title{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;}

/* Steps */
.steps{display:flex;align-items:center;margin-bottom:20px;gap:0;}
.step{text-align:center;flex:1;}
.step-num{width:26px;height:26px;border-radius:50%;background:#e0e0e0;color:#999;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;}
.step-num.active{background:#1a1a2e;color:#fff;}
.step-num.done{background:#2e7d46;color:#fff;}
.step-label{font-size:10px;color:#aaa;}
.step-line{flex:1;height:2px;background:#e0e0e0;margin-bottom:16px;}

/* Saved list */
.recap-item{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border:1px solid #ebebeb;border-radius:8px;margin-bottom:8px;background:#fafafa;}
.recap-title{font-size:13px;font-weight:700;}
.recap-meta{font-size:11px;color:#aaa;margin-top:2px;}
.recap-actions{display:flex;gap:8px;flex-shrink:0;}
.btn-update{background:#1a5c32;color:#fff;border:none;padding:6px 13px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;}
.btn-update:hover{background:#2e7d46;}
.btn-dl{background:#1a3a6e;color:#fff;border:none;padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;}
.btn-dl:hover{background:#254d94;}
.btn-del{background:#dc3545;color:#fff;border:none;padding:6px 11px;border-radius:6px;cursor:pointer;font-size:12px;}

/* Forms */
label{display:block;font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
input[type=text],select,textarea{width:100%;border:1px solid #ddd;border-radius:6px;padding:8px 10px;font-size:13px;color:#1a1a2e;background:#fff;font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a1a2e;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
.frow{margin-bottom:13px;}

/* Buttons */
.btn-primary{background:#1a1a2e;color:#fff;border:none;padding:12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;width:100%;}
.btn-primary:hover{background:#2c2c4a;}
.btn-secondary{background:#f0f2f5;color:#1a1a2e;border:1px solid #ddd;padding:9px 20px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;}
.btn-back{background:none;color:#aaa;border:none;cursor:pointer;font-size:13px;padding:4px 0;display:flex;align-items:center;gap:5px;margin-bottom:13px;}
.btn-back:hover{color:#1a1a2e;}

/* Upload */
.upload-zone{border:2px dashed #ccc;border-radius:8px;padding:26px;text-align:center;cursor:pointer;transition:.2s;}
.upload-zone:hover,.upload-zone.drag{border-color:#1a1a2e;background:#f6f6ff;}
.upload-zone.has-files{border-color:#2e7d46;background:#f0fff4;border-style:solid;}
.upload-hint{font-size:13px;color:#bbb;}
.file-list{list-style:none;margin-top:10px;text-align:left;}
.file-list li{font-size:12px;color:#444;padding:2px 0;}
.file-list li::before{content:"✓ ";color:#2e7d46;font-weight:700;}

/* Existing POs */
.po-box{background:#eef5ff;border:1px solid #b8d0f8;border-radius:8px;padding:11px 13px;margin-bottom:11px;}
.po-box p{font-size:12px;font-weight:600;color:#3a5a8a;margin-bottom:6px;}
.po-chips{display:flex;flex-wrap:wrap;gap:5px;}
.po-chip{background:#fff;border:1px solid #b8d0f8;border-radius:4px;padding:2px 8px;font-size:12px;}

/* Color rows */
.color-row{margin-bottom:10px;}
.color-row label{font-size:12px;font-weight:700;color:#555;}
.color-row input{font-size:13px;}

/* Sketch */
.sketch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:11px;}
.sketch-card{border:1px solid #ddd;border-radius:8px;padding:11px;text-align:center;}
.sketch-card label{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:7px;display:block;}
.sketch-preview{width:100%;height:100px;object-fit:contain;border-radius:4px;margin-bottom:6px;display:none;}
.sketch-btn{background:#f5f5f5;border:1px dashed #ccc;border-radius:6px;padding:16px 8px;cursor:pointer;width:100%;font-size:12px;color:#aaa;}
.sketch-btn:hover{background:#ebebeb;}
.sketch-clear{font-size:11px;color:#dc3545;cursor:pointer;margin-top:4px;display:none;}

/* Fabric table */
.fabric-table{width:100%;border-collapse:collapse;font-size:12px;}
.fabric-table th{background:#1a1a2e;color:#fff;padding:7px 9px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;}
.fabric-table td{padding:5px 7px;border:1px solid #ebebeb;}
.fabric-table tr:nth-child(even) td{background:#f9f9f9;}
.fabric-table input{border:none;background:transparent;width:100%;font-size:12px;padding:2px 3px;color:#1a1a2e;}
.fabric-table input:focus{background:#fff9e6;outline:none;border-bottom:1px solid #f0c040;}
.auto-fill{background:#e8f4fd !important;}
.edit-cell{background:#f0fff4 !important;}
.btn-add-row{background:#f5f5f5;border:1px dashed #ccc;border-radius:6px;padding:7px;width:100%;cursor:pointer;font-size:12px;color:#888;margin-top:7px;}

/* Revision */
.rev-box{background:#fffbea;border:1px solid #ffd740;border-radius:8px;padding:15px;margin-top:16px;}
.rev-title{font-size:10px;font-weight:700;color:#6b4c00;text-transform:uppercase;letter-spacing:1px;margin-bottom:11px;}
.rev-past{margin-bottom:12px;}
.rev-entry{background:#fff;border:1px solid #ffe082;border-radius:6px;padding:9px 11px;margin-bottom:7px;}
.rev-entry-date{font-size:11px;color:#aaa;margin-bottom:3px;}
.rev-entry-notes{font-size:12px;color:#1a1a2e;font-weight:600;}
.rev-new{background:#fffde7;border:1px dashed #ffd740;border-radius:7px;padding:11px;}
.rev-new label{font-size:10px;font-weight:700;color:#6b4c00;}
.rev-new .auto-info{font-size:11px;color:#999;margin:4px 0 7px;}
.rev-new textarea{font-size:12px;resize:vertical;min-height:56px;}

/* Banner */
.update-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:9px 13px;margin-bottom:13px;font-size:12px;color:#856404;font-weight:600;}

/* Loading / Success */
.loading{text-align:center;padding:50px;}
.spinner{width:36px;height:36px;border:3px solid #f0f0f0;border-top-color:#1a1a2e;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 13px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{font-size:13px;color:#aaa;}
.success-card{text-align:center;padding:44px;}
.success-icon{font-size:42px;margin-bottom:13px;}
.success-title{font-size:18px;font-weight:700;margin-bottom:7px;}
.success-sub{font-size:13px;color:#aaa;margin-bottom:22px;}
.success-btns{display:flex;gap:10px;justify-content:center;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:11px;padding:24px;width:410px;max-width:95vw;}
.modal h2{font-size:15px;font-weight:700;margin-bottom:16px;}
.modal-btns{display:flex;gap:9px;margin-top:16px;}
#connStatus{font-size:12px;color:#888;margin-top:8px;}

.hidden{display:none;}
</style>
</head>
<body>

<div class="header">
  <h1>🧥 ORDER RECAP</h1>
  <button class="btn-settings" onclick="openSettings()">⚙ Settings</button>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <div class="frow">
      <label>API Key</label>
      <input type="text" id="apiKey" placeholder="sk-ant-...">
    </div>
    <div class="frow">
      <label>Backend URL</label>
      <input type="text" id="backendUrl" placeholder="https://order-recap-app.onrender.com">
    </div>
    <div class="modal-btns">
      <button class="btn-primary" style="padding:10px 0;" onclick="saveSettings()">저장</button>
      <button class="btn-secondary" onclick="testConn()">연결 테스트</button>
      <button class="btn-secondary" onclick="closeSettings()">닫기</button>
    </div>
    <p id="connStatus"></p>
  </div>
</div>

<div class="container" id="app"></div>

<script>
// ══════════════════════════════════
// Config & State
// ══════════════════════════════════
let cfg = {
  apiKey:     localStorage.getItem('ora_key')  || '',
  backendUrl: localStorage.getItem('ora_url')  || ''
};

let st = {
  step: 0, isUpdate: false, editingFile: null,
  fileNumber:'', sewing:'INT, S.A.', printing:'N/A', washing:'N/A', presentation:'FOLDED',
  parsedPOs:[], keepExisting:true,
  colorNames:{}, fabricCombos:[], sketches:{},
  revisionDesc:''
};

let saved = JSON.parse(localStorage.getItem('ora_saved') || '{}');
let newFiles = [];

// ══════════════════════════════════
// Settings
// ══════════════════════════════════
function openSettings(){
  document.getElementById('apiKey').value = cfg.apiKey;
  document.getElementById('backendUrl').value = cfg.backendUrl;
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings(){
  cfg.apiKey     = document.getElementById('apiKey').value.trim();
  cfg.backendUrl = document.getElementById('backendUrl').value.trim().replace(/\/$/,'');
  localStorage.setItem('ora_key', cfg.apiKey);
  localStorage.setItem('ora_url', cfg.backendUrl);
  document.getElementById('connStatus').textContent = '✅ 저장됨';
  setTimeout(closeSettings, 700);
}
async function testConn(){
  const url = document.getElementById('backendUrl').value.trim().replace(/\/$/,'');
  document.getElementById('connStatus').textContent = '연결 중...';
  try {
    const r = await fetch(url+'/health');
    const d = await r.json();
    document.getElementById('connStatus').textContent =
      d.template ? '✅ 서버 연결 성공 (템플릿 있음)' : '⚠️ 서버 연결됨 (템플릿 없음)';
  } catch(e) {
    document.getElementById('connStatus').textContent = '❌ 실패: '+e.message;
  }
}

// ══════════════════════════════════
// Router
// ══════════════════════════════════
function render(){
  const el = document.getElementById('app');
  if (st.step===0) el.innerHTML = renderHome();
  else if (st.step===1) el.innerHTML = renderStep1();
  else if (st.step===2) el.innerHTML = renderStep2();
  else if (st.step===3) el.innerHTML = renderDone();
  bindDrop();
}

// ══════════════════════════════════
// HOME
// ══════════════════════════════════
function renderHome(){
  const keys = Object.keys(saved);
  let list = keys.length === 0
    ? '<p style="font-size:13px;color:#ccc;text-align:center;padding:18px 0;">저장된 Order Recap 없음</p>'
    : keys.map(fn => {
        const s = saved[fn];
        const revs = s.revisions||[];
        const lastDate = revs.length ? revs[revs.length-1].date : '최초 생성';
        const styles = [...new Set((s.pos||[]).map(p=>p.style).filter(Boolean))].join(', ');
        return `<div class="recap-item">
          <div>
            <div class="recap-title">${fn}</div>
            <div class="recap-meta">${styles||''}${revs.length?' &nbsp;│&nbsp; Rev '+revs.length:''} &nbsp;│&nbsp; ${lastDate}</div>
          </div>
          <div class="recap-actions">
            <button class="btn-dl" onclick="reDownload('${fn}')">📥 다운받기</button>
            <button class="btn-update" onclick="startUpdate('${fn}')">업데이트</button>
            <button class="btn-del" onclick="delRecap('${fn}')">삭제</button>
          </div>
        </div>`;
      }).join('');
  return `
    <div class="card"><div class="card-title">저장된 Order Recap</div>${list}</div>
    <button class="btn-primary" onclick="startNew()">+ 새 Order Recap 만들기</button>`;
}

// ══════════════════════════════════
// STEP 1
// ══════════════════════════════════
function renderStep1(){
  let existBox = '';
  if(st.isUpdate && saved[st.editingFile]){
    const chips = (saved[st.editingFile].pos||[])
      .map(p=>p.po_number).filter(Boolean)
      .map(n=>`<span class="po-chip">${n}</span>`).join('');
    existBox = `
      <div class="po-box"><p>📋 기존 PO (유지됨)</p><div class="po-chips">${chips||'없음'}</div></div>
      <div class="frow" style="margin-bottom:10px;">
        <label style="text-transform:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;">
          <input type="checkbox" id="keepChk" ${st.keepExisting?'checked':''} onchange="st.keepExisting=this.checked">
          기존 PO 유지 (새 PO를 추가/교체)
        </label>
      </div>`;
  }
  return `
    ${stepBar(1)}
    ${st.isUpdate?`<div class="update-banner">⚡ 업데이트 모드 — ${st.editingFile}</div>`:''}
    <button class="btn-back" onclick="goHome()">← 홈</button>
    <div class="card">
      <div class="card-title">기본 정보</div>
      <div class="grid2" style="margin-bottom:13px;">
        <div><label>File #</label>
          <input type="text" id="fnInput" value="${st.fileNumber}" placeholder="예: AL-2026-001" ${st.isUpdate?'readonly':''}>
        </div>
        <div><label>Season</label>
          <input type="text" id="seasonInput" value="${st.season||''}" placeholder="예: FA26, SP27">
        </div>
      </div>
      <div class="grid4">
        <div><label>Sewing</label><select id="sewSel">${opts(['INT, S.A.','JS INTERNATIONAL, S.A.','APPAREL LINKS, S.A.','TRINIDAD, S.A.','직접입력'],st.sewing)}</select></div>
        <div><label>Printing</label><select id="prtSel">${opts(['N/A','PEOPLE AND ART','ART WELL','직접입력'],st.printing)}</select></div>
        <div><label>Washing</label><select id="wshSel">${opts(['N/A','KIMS','직접입력'],st.washing)}</select></div>
        <div><label>Presentation</label><select id="presSel">${opts(['FOLDED','HANGING','직접입력'],st.presentation)}</select></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">PO PDF 업로드</div>
      ${existBox}
      <div class="upload-zone" id="dropZone" onclick="document.getElementById('poInput').click()">
        <div class="upload-hint">클릭하거나 드래그해서 PO PDF 업로드 (여러 개 가능)</div>
        <ul class="file-list" id="fileListEl"></ul>
      </div>
      <input type="file" id="poInput" multiple accept=".pdf" style="display:none" onchange="onFiles(this.files)">
    </div>
    ${!st.isUpdate ? `
    <div class="card">
      <div class="card-title">초기 Revision 기록</div>
      <div style="font-size:12px;color:#aaa;margin-bottom:8px;">날짜: ${today()} — Revision History 첫 줄에 기록됩니다</div>
      <label>Notes</label>
      <input type="text" id="initRevNote" value="${st.initRevNote||'ORDER RECAP 생성.'}" placeholder="ORDER RECAP 생성.">
    </div>` : ''}
    <button class="btn-primary" onclick="submitStep1()">PO 분석 시작 →</button>`;
}

// ══════════════════════════════════
// STEP 2
// ══════════════════════════════════
function renderStep2(){
  const codes   = uniqueCodes();
  const styles  = uniqueStyles();
  ensureFabricCombos();

  // Color inputs — auto-fill from COLOR_MAP, manual if not found
  const colorHtml = codes.length
    ? codes.map(c=>{
        const knownName = COLOR_MAP[c];
        const savedName = st.colorNames[c]||'';
        const displayVal = savedName || knownName || '';
        const isKnown = !!knownName;
        return `<div class="color-row" style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:70px;flex-shrink:0;"><span style="font-size:12px;font-weight:700;background:${isKnown?'#e8f4fd':'#fff3cd'};padding:3px 8px;border-radius:4px;border:1px solid ${isKnown?'#b3d4ff':'#ffd740'};">${c}</span></div>
          <div style="flex:1;"><input type="text" id="cn_${c}" value="${displayVal}" placeholder="${isKnown?'자동입력됨 (수정 가능)':'리스트 없음 — 직접 입력'}" style="border-color:${isKnown?'#b3d4ff':'#ffd740'};background:${isKnown?'#f0f8ff':'#fffde7'};"></div>
          <div style="font-size:11px;color:${isKnown?'#888':'#e67e22'};width:160px;flex-shrink:0;">${isKnown?knownName:'⚠ 리스트 없음'}</div>
        </div>`;
      }).join('')
    : '<p style="font-size:13px;color:#ccc;">Color Code 없음</p>';

  // Sketch — 저장된 스케치 자동 로드 + 드롭다운 선택 + 직접 업로드
  const savedSketches = JSON.parse(localStorage.getItem('ora_sketches') || '{}');
  // 저장된 스케치 자동 불러오기
  styles.forEach(s => {
    if (!st.sketches[s] && savedSketches[s]) st.sketches[s] = savedSketches[s];
  });
  const savedStyleKeys = Object.keys(savedSketches);

  const sketchHtml = styles.length
    ? `<div class="sketch-grid">${styles.map(s=>{
        const src = st.sketches[s]||'';
        // 드롭다운 옵션: localStorage 저장 스케치 + 현재 세션 스케치 합산
        const sessionKeys = Object.keys(st.sketches).filter(k=>st.sketches[k]);
        const allKeys = [...new Set([...savedStyleKeys, ...sessionKeys])];
        return `<div class="sketch-card">
          <label>${s}</label>
          <img class="sketch-preview" id="prev_${s}" src="${src}" style="${src?'display:block':''}">
          <div style="margin-bottom:5px;">
            <select id="sksel_${s}" onchange="onSketchSelect(this,'${s}')" style="width:100%;font-size:11px;padding:3px 5px;border:1px solid #ddd;border-radius:5px;">
              <option value="">${allKeys.length?'-- 저장된 스케치 선택 --':'-- 저장된 스케치 없음 --'}</option>
              ${allKeys.map(k=>`<option value="${k}"${k===s?' selected':''}>${k}</option>`).join('')}
            </select>
          </div>
          <div class="sketch-btn" id="skbtn_${s}" onclick="document.getElementById('sk_${s}').click()">${src?'🔄 새로 업로드':'📎 직접 업로드'}</div>
          <input type="file" id="sk_${s}" accept="image/*" style="display:none" onchange="onSketch(this,'${s}')">
          <div class="sketch-clear" id="skc_${s}" style="${src?'display:block':''}" onclick="clrSketch('${s}')">✕ 삭제</div>
        </div>`;
      }).join('')}</div>`
    : '<p style="font-size:13px;color:#ccc;">Style 정보 없음</p>';

  // Fabric table with dropdowns
  const fabricRows = st.fabricCombos.map((fc,i)=>{
    const bcVal = fc.bodyCode||'';
    const bdVal = fc.bodyDesc||'';
    const tcVal = fc.trimCode||'';
    const tdVal = fc.trimDesc||'';
    const bcIsCustom = bcVal && !BODY_FABRICS.find(f=>f.code===bcVal);
    const tcIsCustom = tcVal && !TRIM_FABRICS.find(f=>f.code===tcVal);
    return `<tr>
      <td style="font-weight:700;text-align:center;">${fc.combo}</td>
      <td class="edit-cell">
        <select id="fc_bc_${i}" onchange="onBodyCodeChange(${i})" style="font-size:12px;padding:3px 5px;">
          <option value="">-- 선택 --</option>
          ${BODY_FABRICS.map(f=>`<option value="${f.code}"${f.code===bcVal?' selected':''}>${f.code}</option>`).join('')}
          <option value="직접입력"${'직접입력'===bcVal||bcIsCustom?' selected':''}>직접입력</option>
        </select>
        <input id="fc_bc_custom_${i}" style="display:${(bcIsCustom||bcVal==='직접입력')?'block':'none'};margin-top:3px;font-size:12px;" value="${bcIsCustom?bcVal:''}" placeholder="코드 직접입력">
      </td>
      <td class="edit-cell">
        <input id="fc_bd_${i}" value="${bdVal}" placeholder="자동입력 또는 수정" style="background:${bdVal?'#f0fff4':'#fff'};">
      </td>
      <td class="edit-cell">
        <select id="fc_tc_${i}" onchange="onTrimCodeChange(${i})" style="font-size:12px;padding:3px 5px;">
          <option value="">-- 선택 --</option>
          ${TRIM_FABRICS.map(f=>`<option value="${f.code}"${f.code===tcVal?' selected':''}>${f.code}</option>`).join('')}
          <option value="직접입력"${'직접입력'===tcVal||tcIsCustom?' selected':''}>직접입력</option>
        </select>
        <input id="fc_tc_custom_${i}" style="display:${(tcIsCustom||tcVal==='직접입력')?'block':'none'};margin-top:3px;font-size:12px;" value="${tcIsCustom?tcVal:''}" placeholder="코드 직접입력">
      </td>
      <td class="edit-cell">
        <input id="fc_td_${i}" value="${tdVal}" placeholder="자동입력 또는 수정" style="background:${tdVal?'#f0fff4':'#fff'};">
      </td>
    </tr>`;
  }).join('');

  // Revision section (update mode only)
  let revHtml = '';
  if(st.isUpdate){
    const pastRevs = (saved[st.editingFile]?.revisions)||[];
    const newPOStr = st.parsedPOs
      .filter(p=> !(saved[st.editingFile]?.pos||[]).find(ep=>ep.po_number===p.po_number))
      .map(p=>p.po_number).filter(Boolean).join(', ');
    const pastHtml = pastRevs.map(r=>`
      <div class="rev-entry">
        <div class="rev-entry-date">${r.date}</div>
        <div class="rev-entry-notes">${r.notes||'(내용 없음)'}</div>
      </div>`).join('');
    revHtml = `
      <div class="rev-box">
        <div class="rev-title">📋 Revision History</div>
        ${pastRevs.length ? `<div class="rev-past">${pastHtml}</div>` : ''}
        <div class="rev-new">
          <label>새 Revision 내용</label>
          <div class="auto-info">날짜: ${today()} &nbsp;│&nbsp; 변경 PO: ${newPOStr||'(없음)'}</div>
          <textarea id="revDesc" placeholder="변경 내용 입력 (예: PO 3510049652 수량 변경)">${st.revisionDesc||''}</textarea>
        </div>
      </div>`;
  }

  return `
    ${stepBar(2)}
    ${st.isUpdate?`<div class="update-banner">⚡ 업데이트 모드 — ${st.editingFile}</div>`:''}
    <button class="btn-back" onclick="goStep1()">← Step 1</button>
    <div class="card"><div class="card-title">Color Name 입력</div>${colorHtml}</div>
    <div class="card"><div class="card-title">스케치 업로드</div>${sketchHtml}</div>
    <div class="card">
      <div class="card-title">Fabric Combination</div>
      <div style="overflow-x:auto;">
        <table class="fabric-table">
          <thead><tr>
            <th style="width:60px;">COMBO</th>
            <th>BODY CODE</th><th>BODY DESCRIPTION</th>
            <th>TRIM CODE</th><th>TRIM DESCRIPTION</th>
          </tr></thead>
          <tbody id="fabricTbody">${fabricRows}</tbody>
        </table>
      </div>
      <button class="btn-add-row" onclick="addFabRow()">+ 행 추가</button>
    </div>
    ${revHtml}
    <button class="btn-primary" onclick="submitStep2()">
      ${st.isUpdate?'업데이트 Excel 생성 →':'최종 Excel 생성 →'}
    </button>`;
}

// ══════════════════════════════════
// Step bar
// ══════════════════════════════════
function stepBar(active){
  const labels = ['PO 업로드','정보 입력','완료'];
  let h = '<div class="steps">';
  labels.forEach((lbl,i)=>{
    const n=i+1, cls=n<active?'done':n===active?'active':'';
    h+=`<div class="step"><div class="step-num ${cls}">${n<active?'✓':n}</div><div class="step-label">${lbl}</div></div>`;
    if(i<labels.length-1) h+='<div class="step-line"></div>';
  });
  return h+'</div>';
}

// Navigation
// ══════════════════════════════════

// ══════════════════════════════════
// Step 1 handlers
// ══════════════════════════════════
function bindDrop(){
  const z=document.getElementById('dropZone');
  if(!z) return;
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
  z.addEventListener('dragleave',()=>z.classList.remove('drag'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag');onFiles(e.dataTransfer.files);});
}
function onFiles(files){
  newFiles=Array.from(files);
  const z=document.getElementById('dropZone');
  const l=document.getElementById('fileListEl');
  if(!z||!l) return;
  z.classList.toggle('has-files',newFiles.length>0);
  l.innerHTML=newFiles.map(f=>`<li>${f.name}</li>`).join('');
}
function readForm1(){
  st.fileNumber   = document.getElementById('fnInput')?.value.trim()  || st.fileNumber;
  st.season       = document.getElementById('seasonInput')?.value.trim() || st.season||'';
  st.sewing       = document.getElementById('sewSel')?.value           || st.sewing;
  st.printing     = document.getElementById('prtSel')?.value           || st.printing;
  st.washing      = document.getElementById('wshSel')?.value           || st.washing;
  st.presentation = document.getElementById('presSel')?.value          || st.presentation;
  const initEl = document.getElementById('initRevNote');
  if(initEl) st.initRevNote = initEl.value.trim() || 'ORDER RECAP 생성.';
}
async function submitStep1(){
  readForm1();
  if(!st.fileNumber){alert('File # 입력해주세요');return;}
  if(newFiles.length===0 && !st.isUpdate){alert('PO PDF를 업로드해주세요');return;}
  if(newFiles.length===0 && st.isUpdate){
    if(st.keepExisting && saved[st.editingFile]){
      st.parsedPOs=JSON.parse(JSON.stringify(saved[st.editingFile].pos||[]));
      ensureFabricCombos();st.step=2;render();
    } else alert('새 PO를 업로드하거나 기존 PO 유지를 선택해주세요');
    return;
  }
  loading('PO 분석 중... (PO 수에 따라 1~3분 소요)');
  const fd=new FormData();
  newFiles.forEach(f=>fd.append('files',f));
  try{
    const r=await fetch(cfg.backendUrl+'/parse-po',{method:'POST',headers:{'X-API-Key':cfg.apiKey},body:fd});
    const d=await r.json();
    let fresh=(d.pos||[]).filter(p=>!p.error);
    if(st.isUpdate && st.keepExisting && saved[st.editingFile]){
      const existing=(saved[st.editingFile].pos||[]).filter(ep=>!fresh.find(np=>np.po_number===ep.po_number));
      st.parsedPOs=[...existing,...fresh];
    } else st.parsedPOs=fresh;
    if(st.parsedPOs.length===0){alert('PO 파싱 실패. 로그를 확인해주세요.');st.step=1;render();return;}
    ensureFabricCombos();st.step=2;render();
  } catch(e){alert('오류: '+e.message);st.step=1;render();}
}

// ══════════════════════════════════
// Step 2 handlers
// ══════════════════════════════════
function uniqueCodes(){
  const seen=new Set();
  return st.parsedPOs.map(p=>p.color_code).filter(c=>c&&!seen.has(c)&&seen.add(c));
}
function uniqueStyles(){
  const seen=new Set();
  return st.parsedPOs.map(p=>p.style).filter(s=>s&&!seen.has(s)&&seen.add(s));
}
function normFiber(d){
  if(!d) return 'UNKNOWN';
  const u=d.toUpperCase();
  if(u.includes('60')&&(u.includes('COTT')||u.includes('POLY'))) return '60/40 COTTON/POLY';
  if(u.includes('90')&&(u.includes('COTT')||u.includes('POLY'))) return '90/10 COTTON/POLY';
  if(u.includes('100')&&u.includes('POLY')&&!u.includes('COTT')) return '100% POLYESTER';
  if(u.includes('100')||(u.includes('COTT')&&!u.includes('POLY'))) return '100% COTTON';
  return u.trim();
}
function ensureFabricCombos(){
  const map=new Map();
  let idx=1;
  st.parsedPOs.forEach(po=>{
    const n=normFiber(po.fabric_desc);
    if(n&&n!=='UNKNOWN'&&!map.has(n)) map.set(n,{combo:'C'+idx++,bodyDesc:po.fabric_desc||n});
  });
  const existing=st.fabricCombos;
  const next=[];
  map.forEach((val,n)=>{
    const ex=existing.find(fc=>normFiber(fc.bodyDesc)===n);
    next.push(ex?ex:{combo:val.combo,bodyCode:'',bodyDesc:val.bodyDesc,trimCode:'',trimDesc:''});
  });
  next.forEach((fc,i)=>{fc.combo='C'+(i+1);});
  if(next.length>0) st.fabricCombos=next;
}
function addFabRow(){
  collectFab();
  st.fabricCombos.push({combo:'C'+(st.fabricCombos.length+1),bodyCode:'',bodyDesc:'',trimCode:'',trimDesc:''});
  render();
}
function collectFab(){
  st.fabricCombos.forEach((fc,i)=>{
    // Body Code
    const bcSel = document.getElementById(`fc_bc_${i}`)?.value||'';
    const bcCustom = document.getElementById(`fc_bc_custom_${i}`)?.value.trim()||'';
    fc.bodyCode = (bcSel==='직접입력') ? bcCustom : bcSel;
    // Body Desc (사용자가 수정했을 수 있으므로 input 값 그대로)
    fc.bodyDesc = document.getElementById(`fc_bd_${i}`)?.value.trim()||fc.bodyDesc;
    // Trim Code
    const tcSel = document.getElementById(`fc_tc_${i}`)?.value||'';
    const tcCustom = document.getElementById(`fc_tc_custom_${i}`)?.value.trim()||'';
    fc.trimCode = (tcSel==='직접입력') ? tcCustom : tcSel;
    // Trim Desc
    fc.trimDesc = document.getElementById(`fc_td_${i}`)?.value.trim()||fc.trimDesc;
  });
}

// ── Fabric dropdown 데이터 ──────────────────────
const BODY_FABRICS = [
  {code:'JE002',  desc:'100% COTTON JERSEY, 6.75oz (230GSM)'},
  {code:'JE003',  desc:'90% COTTON 10% POLYESTER JERSEY, 6.75oz (230GSM)'},
  {code:'600106', desc:'60% COTTON 40% POLYESTER JERSEY, 6.75oz (230GSM)'},
  {code:'JE1068', desc:'(NEON) 60% COTTON 40% POLYESTER JERSEY, 6.75oz (230GSM)'},
];
const TRIM_FABRICS = [
  {code:'RB002',  desc:'100% COTTON 1X1 RIB, 8.95oz (302GSM)'},
  {code:'RB003',  desc:'90% COTTON 10% POLYESTER 1X1 RIB, 8.95oz (302GSM)'},
  {code:'600107', desc:'60% COTTON 40% POLYESTER 1X1 RIB, 8.95oz (302GSM)'},
  {code:'RB1053', desc:'(NEON) 60% COTTON 40% POLYESTER 1X1 RIB, 8.95oz (302GSM)'},
];

function onBodyCodeChange(i){
  const sel = document.getElementById(`fc_bc_${i}`);
  const custom = document.getElementById(`fc_bc_custom_${i}`);
  const descEl = document.getElementById(`fc_bd_${i}`);
  if(!sel) return;
  if(sel.value==='직접입력'){
    custom.style.display='block';
    descEl.value='';
  } else {
    custom.style.display='none';
    const found = BODY_FABRICS.find(f=>f.code===sel.value);
    if(found) descEl.value = found.desc;
  }
}
function onTrimCodeChange(i){
  const sel = document.getElementById(`fc_tc_${i}`);
  const custom = document.getElementById(`fc_tc_custom_${i}`);
  const descEl = document.getElementById(`fc_td_${i}`);
  if(!sel) return;
  if(sel.value==='직접입력'){
    custom.style.display='block';
    descEl.value='';
  } else {
    custom.style.display='none';
    const found = TRIM_FABRICS.find(f=>f.code===sel.value);
    if(found) descEl.value = found.desc;
  }
}
function onSketch(input,style){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    const dataUrl = e.target.result;
    st.sketches[style] = dataUrl;
    // localStorage에 스케치 저장
    try {
      const store = JSON.parse(localStorage.getItem('ora_sketches')||'{}');
      store[style] = dataUrl;
      localStorage.setItem('ora_sketches', JSON.stringify(store));
    } catch(ex){ console.warn('sketch save failed:', ex); }
    // 미리보기 업데이트
    const prev = document.getElementById('prev_'+style);
    const clr  = document.getElementById('skc_'+style);
    if(prev){ prev.src = dataUrl; prev.style.display = 'block'; }
    if(clr)  clr.style.display = 'block';
    // 드롭다운에 현재 스타일 추가 & 선택
    const sel = document.getElementById('sksel_'+style);
    if(sel){
      if(![...sel.options].find(o=>o.value===style)){
        const o=document.createElement('option'); o.value=style; o.text=style; sel.add(o);
      }
      sel.value = style;
    }
    // 버튼 텍스트 변경 — id로 직접 찾기
    const uploadBtn = document.getElementById('skbtn_'+style);
    if(uploadBtn) uploadBtn.textContent = '🔄 새로 업로드';
  };
  r.readAsDataURL(file);
}

function onSketchSelect(sel, style){
  const key = sel.value;
  if(!key){ return; }
  // st.sketches에 이미 있으면 그걸 사용
  if(st.sketches[key]){
    st.sketches[style] = st.sketches[key];
    const prev = document.getElementById('prev_'+style);
    const clr  = document.getElementById('skc_'+style);
    if(prev){ prev.src = st.sketches[key]; prev.style.display = 'block'; }
    if(clr)  clr.style.display = 'block';
    const uploadBtn = document.getElementById('skbtn_'+style);
    if(uploadBtn) uploadBtn.textContent = '🔄 새로 업로드';
    return;
  }
  // localStorage에서 찾기
  try {
    const store = JSON.parse(localStorage.getItem('ora_sketches')||'{}');
    const src = store[key];
    if(src){
      st.sketches[style] = src;
      const prev = document.getElementById('prev_'+style);
      const clr  = document.getElementById('skc_'+style);
      if(prev){ prev.src = src; prev.style.display = 'block'; }
      if(clr)  clr.style.display = 'block';
      const uploadBtn = document.getElementById('skbtn_'+style);
      if(uploadBtn) uploadBtn.textContent = '🔄 새로 업로드';
    } else {
      alert(`"${key}" 스케치가 저장되어 있지 않아요. 직접 업로드해주세요.`);
      sel.value = '';
    }
  } catch(ex){
    console.warn('sketch load failed:', ex);
  }
}
function clrSketch(style){
  st.sketches[style]='';
  const prev=document.getElementById('prev_'+style);
  const clr=document.getElementById('skc_'+style);
  if(prev){prev.src='';prev.style.display='none';}
  if(clr) clr.style.display='none';
}
// ── Color Code → Name 매핑 ──────────────────────
const COLOR_MAP = {
  'BLK':'BLACK','BLM':'BRITE LIME','BLS':'BLUESTONE',
  'BOG':'BRITE ORANGE','BRN':'CARHARTT BROWN','CRH':'CARBON HEATHER',
  'DES':'DESERT','DOV':'DUSTY OLIVE','EE7':'DARK CLOVE HEATHER',
  'G55':'NORTH WOODS HEATHER','GR4':'HARVEST SAGE HEATHER',
  'GR9':'FADED FATIGUE','H75':'LAKESHORE','HGY':'HEATHER GREY',
  'DV0':'DARK HARBOR TEAL','HW4':'SUPERSTORM',
  'HX6':'DEEP WORKWEAR BLUE HEATHER','NVY':'NAVY','PRT':'PORT',
  'RG0':'HOMESTEAD RED','WHT':'WHITE','HH5':'THUNDER CLOUD HEATHER'
};

function collectStep2(){
  uniqueCodes().forEach(c=>{
    const el=document.getElementById('cn_'+c);
    if(el) st.colorNames[c]=el.value.trim();
  });
  collectFab();
  const rd=document.getElementById('revDesc');
  if(rd) st.revisionDesc=rd.value.trim();
}
async function submitStep2(){
  collectStep2();
  // Build revision history
  let revisions=[];
  if(st.isUpdate && saved[st.editingFile]){
    revisions=JSON.parse(JSON.stringify(saved[st.editingFile].revisions||[]));
  }
  if(st.isUpdate){
    const newPOStr=st.parsedPOs
      .filter(p=>!(saved[st.editingFile]?.pos||[]).find(ep=>ep.po_number===p.po_number))
      .map(p=>p.po_number).filter(Boolean).join(', ');
    revisions.push({date:today(),pos_numbers:newPOStr,notes:(newPOStr?'PO: '+newPOStr+' | ':'')+st.revisionDesc});
  } else {
    // 신규 생성: 초기 revision 기록
    revisions.push({date:today(),pos_numbers:'',notes:st.initRevNote||'ORDER RECAP 생성.'});
  }
  loading('Excel 생성 중...');
  const skPayload={};
  Object.entries(st.sketches).forEach(([s,d])=>{if(d) skPayload[s]=d;});
  const payload={
    file_number:st.fileNumber, season:st.season||'', pos:st.parsedPOs,
    color_names:st.colorNames, fabric_combos:st.fabricCombos,
    sketches:skPayload, sewing:st.sewing, printing:st.printing,
    washing:st.washing, presentation:st.presentation,
    revision_history:revisions
  };
  try{
    const r=await fetch(cfg.backendUrl+'/build-excel',{method:'POST',headers:{'Content-Type':'application/json','X-API-Key':cfg.apiKey},body:JSON.stringify(payload)});
    if(!r.ok){const err=await r.json();alert('오류: '+(err.error||r.status));st.step=2;render();return;}
    const blob=await r.blob();
    const fname=`${st.fileNumber}_Order Recap_Team#4_${todayC()}.xlsx`;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
    // Save state
    saved[st.fileNumber]={pos:st.parsedPOs,colorNames:st.colorNames,fabricCombos:st.fabricCombos,
      sketches:{},sewing:st.sewing,printing:st.printing,washing:st.washing,
      presentation:st.presentation,season:st.season||'',revisions};
    localStorage.setItem('ora_saved',JSON.stringify(saved));
    st.step=3;render();
  } catch(e){alert('오류: '+e.message);st.step=2;render();}
}

// ══════════════════════════════════
// Utils
// ══════════════════════════════════
function loading(msg){document.getElementById('app').innerHTML=`<div class="card loading"><div class="spinner"></div><div class="loading-msg">${msg}</div></div>`;}
function today(){return new Date().toISOString().slice(0,10);}
function todayC(){return today().replace(/-/g,'');}
function opts(arr,sel){return arr.map(v=>`<option${v===sel?' selected':''}>${v}</option>`).join('');}

async function reDownload(fn){
  const s=saved[fn];
  if(!s){alert('저장된 데이터를 찾을 수 없어요');return;}
  loading('Excel 다운로드 중...');
  const payload={
    file_number:fn, season:s.season||'', pos:s.pos||[],
    color_names:s.colorNames||{}, fabric_combos:s.fabricCombos||[],
    sketches:{}, sewing:s.sewing||'', printing:s.printing||'',
    washing:s.washing||'', presentation:s.presentation||'',
    revision_history:s.revisions||[]
  };
  try{
    const r=await fetch(cfg.backendUrl+'/build-excel',{method:'POST',headers:{'Content-Type':'application/json','X-API-Key':cfg.apiKey},body:JSON.stringify(payload)});
    if(!r.ok){const err=await r.json();alert('오류: '+(err.error||r.status));render();return;}
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`${fn}_Order Recap_Team#4_${todayC()}.xlsx`;a.click();URL.revokeObjectURL(url);
    render();
  } catch(e){alert('오류: '+e.message);render();}
}
